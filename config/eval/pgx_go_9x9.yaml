# @package _global_
#
# PGX baseline evaluator for Go 9x9.
# Usage: add `- override /eval: pgx_go_9x9` to your experiment defaults.
#
eval:
  - _target_: jaxpot.evaluator.baseline_model.BaselineModelEvaluator
    eval_every: 100
    num_envs: 128
    num_steps: 128
    name: baseline_eval
    baseline_model:
      _target_: jaxpot.models.games.pgx.baseline.PGXBaselineModel
      baseline_model_id: go_9x9_v0
      is_eval: true
