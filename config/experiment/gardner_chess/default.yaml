# @package _global_

defaults:
  - override /logger: multi

  - override /model: chess
  - override /trainer: ppo
  - override /loguru: default
  - override /env: gardner_chess/default
  - override /eval: pgx_gardner_chess
  - _self_

trainer:
  num_epochs: 2
  batch_size: 4096
  entropy_coeff: 0.01
  entropy_coeff_start: 0.05
  entropy_decay_iterations: 20_000
  auxiliary_losses: []

seed: 42
lr: 3e-4
selfplay_num_envs: 128
random_num_envs: 128
league_num_envs: 256
archive_num_envs: 128
base_unit: 32
num_steps: 256
total_iters: 20_000
gamma: 0.99
grad_accum_steps: 1
use_target_selfplay: true
target_tau: 0.002
target_update_freq: 1

eval_every: 50
save_every: 100
keep_last_k: 100
resume_from: null

# League configuration
league_max_size: 10
league_add_every: 250
league_temp: 0.6
league_score_alpha: 0.1
# Warmup: play only vs random for this many iters before starting league
random_warmup_iters: 0
# League logging cadence
league_log_every: 10

# Archive configuration and evaluation-based promotion
archive_max_size: 32
forgotten_eval_every: 500
forgotten_result_margin: 0.01

tags: ["gardner_chess"]
experiment_name: "GardnerChess_MLP"
