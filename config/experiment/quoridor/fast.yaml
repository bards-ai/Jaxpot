# @package _global_

defaults:
  - override /logger: multi
  - override /model: mlp
  - override /trainer: ppo
  - override /env: quoridor/default
  - override /eval: quoridor_baseline
  - _self_

tags: ["quoridor", "mlp"]
experiment_name: "Quoridor_fast"

trainer:
  num_epochs: 3
  batch_size: 16384
  kl_coef: 1e-4
  clip_value: 1.0
  clip_eps: 0.2
  value_coeff: 0.5
  entropy_coeff: 0.01
  entropy_coeff_start: 0.05
  entropy_decay_iterations: 2000
  auxiliary_losses: []

model:
  hidden_dims: [512, 256, 128]

seed: 42
lr: 3e-4
selfplay_num_envs: 2048
random_num_envs: 1024
league_num_envs: 2048
archive_num_envs: 1024
base_unit: 256
num_steps: 256
total_iters: 10_000
gamma: 0.999
gae_lambda: 0.95
grad_accum_steps: 1
max_grad_norm: 0.5
use_target_selfplay: false

save_every: 100
keep_last_k: 5
best_checkpoint_top_k: 10
resume_from: null

# League configuration
league_max_size: 8
league_add_every: 500
league_temp: 0.6
league_score_alpha: 0.1
random_warmup_iters: 200
league_log_every: 10

# Archive configuration
archive_max_size: 32
forgotten_result_margin: 0.001
