# @package _global_
# Kuhn Nash v1 — paper exact: clip=0.025, 8 epochs, lr=6.25e-5
# Goal: minimize exploitability

defaults:
  - override /logger: multi
  - override /model: mlp
  - override /trainer: ppo
  - override /env: kuhn_poker/default
  - override /eval: kuhn_poker/default
  - _self_

tags: ["kuhn_poker", "nash_v1"]
experiment_name: "kuhn_poker_nash_v1"

model:
  hidden_dims: [64, 64, 64]
  activation: tanh

trainer:
  num_epochs: 8
  batch_size: 2048
  auxiliary_losses: []
  clip_eps: 0.025
  clip_value: 10.0
  value_coeff: 0.0625
  entropy_coeff: 0.1
  entropy_coeff_start: 0.1
  entropy_decay_iterations: 1_000_000
  kl_coef: 0.0

seed: 42
lr: 6.25e-5
lr_schedule: "constant"
multi_gpu: false
use_target_selfplay: false
selfplay_num_envs: 4096
random_num_envs: 2048
league_num_envs: 4096
archive_num_envs: 1024
base_unit: 128
num_steps: 256
total_iters: 3_000
grad_accum_steps: 1
gamma: 0.99
gae_lambda: 0.95

max_grad_norm: 0.5
save_every: 500
keep_last_k: 5
best_checkpoint_top_k: 5
resume_from: null
