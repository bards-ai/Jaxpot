# @package _global_
# Liar's Dice config inspired by arxiv 2502.08938
#
# From paper ("Reevaluating Policy Gradient Methods for IIGs"):
#   - 3-layer 512-unit MLP with tanh activation
#   - High entropy coefficient (0.1) — critical for mixed strategies in IIGs
#   - 8 update epochs per batch
#   - gamma=0.99, GAE lambda=0.95, max_grad_norm=0.5
#
# Adapted for self-play training (vs paper's exploitability optimization):
#   - clip_eps=0.1 (paper's 0.025 locks at Nash, our self-play needs exploitation)
#   - value_coeff=0.5 (paper's 0.0625 starves value function)
#   - entropy decays 0.1 → 0.01 (paper keeps constant; we need exploitation phase)

defaults:
  - override /logger: multi
  - override /model: mlp
  - override /trainer: ppo
  - override /env: liars_dice/default
  - override /eval: liars_dice/default
  - _self_

tags: ["liars_dice", "paper"]
experiment_name: "liars_dice_paper"

model:
  hidden_dims: [512, 512, 512]
  activation: tanh

trainer:
  num_epochs: 4
  batch_size: 4096
  auxiliary_losses: []
  clip_eps: 0.1
  clip_value: 10.0
  value_coeff: 0.5
  entropy_coeff: 0.01
  entropy_coeff_start: 0.1
  entropy_decay_iterations: 5_000
  kl_coef: 0.0

seed: 42
lr: 1e-4
lr_schedule: "constant"
multi_gpu: false
use_target_selfplay: false
selfplay_num_envs: 8192
random_num_envs: 4096
league_num_envs: 8192
archive_num_envs: 2048
base_unit: 256
num_steps: 256
total_iters: 20_000
grad_accum_steps: 1
gamma: 0.999
gae_lambda: 0.95

max_grad_norm: 0.5
save_every: 100
keep_last_k: 10
best_checkpoint_top_k: 10
resume_from: null
