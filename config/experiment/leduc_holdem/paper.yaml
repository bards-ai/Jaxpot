# @package _global_
# Leduc Holdem — paper-inspired config (arxiv 2502.08938)
# Small game: 34-dim obs, 3 actions (FOLD, CALL, RAISE), ~936 info states
#
# Paper findings: high entropy + tanh MLP works well for IIGs
# Adapted with entropy decay for self-play training

defaults:
  - override /logger: multi
  - override /model: mlp
  - override /trainer: ppo
  - override /env: leduc_holdem/default
  - override /eval: leduc_holdem
  - _self_

tags: ["leduc_holdem", "paper"]
experiment_name: "leduc_holdem_paper"

model:
  hidden_dims: [512, 512, 512]
  activation: tanh

trainer:
  num_epochs: 8
  batch_size: 2048
  auxiliary_losses: []
  clip_eps: 0.1
  clip_value: 10.0
  value_coeff: 0.5
  entropy_coeff: 0.01
  entropy_coeff_start: 0.1
  entropy_decay_iterations: 5_000
  kl_coef: 0.0

seed: 42
lr: 1e-4
lr_schedule: "constant"
multi_gpu: false
use_target_selfplay: false
selfplay_num_envs: 8192
random_num_envs: 4096
league_num_envs: 8192
archive_num_envs: 2048
base_unit: 256
num_steps: 256
total_iters: 20_000
grad_accum_steps: 1
gamma: 0.99
gae_lambda: 0.95

max_grad_norm: 0.5
save_every: 100
keep_last_k: 10
best_checkpoint_top_k: 10
resume_from: null
