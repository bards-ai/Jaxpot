# @package _global_

defaults:
  - override /logger: none
  - override /model: mlp
  - override /trainer: alphazero
  - override /loguru: default
  - override /env: go/9x9
  - override /experiment: null
  - override /train_agent: alphazero
  - override /eval: go/pgx
  - override /advantage_gatherer: per_seat_return
  - _self_

trainer:
  num_epochs: 3
  batch_size: 64
  max_grad_norm: 1.0
  value_coeff: 1.0
  policy_coeff: 1.0

train_agent:
  mcts_config:
    num_simulations: 8
    max_num_considered_actions: 16
    gamma: 1.0

seed: 42
lr: 0.001
lr_schedule: "constant"
lr_end: 1e-5
lr_warmup_iters: 0
multi_gpu: false
selfplay_num_envs: 128
random_num_envs: 0
league_num_envs: 0
archive_num_envs: 0
num_eval_envs: 256
num_steps: 256
total_iters: 10
grad_accum_steps: 1

save_every: 1
keep_last_k: 10
best_checkpoint_top_k: 2
resume_from: null
env_history_len: 1

# League configuration
league_max_size: 8
league_add_every: 0
league_add_every_startup: 0
league_temp: 1.0
league_score_alpha: 0.1
warmup_iters: 10
league_log_every: 100

# Archive configuration
archive_max_size: 32
forgotten_eval_every: 500
forgotten_result_margin: 0.001
forgotten_min_episodes: 50_000

tags: ["go_9x9", "mlp", "alphazero"]
experiment_name: "Go9x9_mlp_alphazero"

base_unit: 128
use_target_selfplay: false
dump_debug_every: null
