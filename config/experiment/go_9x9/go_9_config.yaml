# @package _global_

defaults:
  - override /logger: multi
  - override /model: resnet
  - override /trainer: ppo
  - override /loguru: default
  - override /env: go_9x9
  - override /experiment: null
  - override /train_agent: ppo
  - _self_

trainer:
  num_epochs: 3
  batch_size: 8192
  kl_coef: 0.0001
  clip_value: 1.0
  clip_eps: 0.2
  value_coeff: 0.5
  entropy_coeff: 0.004
  entropy_coeff_start: 0.03
  entropy_decay_iterations: 2000
  auxiliary_losses: []

seed: 42
lr: 1e-3
multi_gpu: false
collect_aux_targets: false
selfplay_num_envs: 1024
random_num_envs: 256
league_num_envs: 1024
archive_num_envs: 256
num_eval_envs: 256
num_steps: 256
total_iters: 2000
gamma: 0.999
gae_lambda: 0.95
grad_accum_steps: 1
max_grad_norm: 0.5

eval:
  - _target_: jaxpot.evaluator.baseline_model.BaselineModelEvaluator
    eval_every: 150
    num_envs: 256
    num_steps: 256
    name: baseline_eval
    baseline_model:
      _target_: jaxpot.models.games.pgx.baseline.PGXBaselineModel
      baseline_model_id: go_9x9_v0
      is_eval: true

eval_every: 150
save_every: 150
keep_last_k: 10
best_checkpoint_top_k: 10
resume_from: null
env_history_len: 1

# League configuration (fills quickly, then trains mostly vs league/archive)
league_max_size: 8
league_add_every: 20
league_add_every_startup: 5
league_temp: 1.0
league_score_alpha: 0.1
warmup_iters: 200
league_log_every: 100

# Archive configuration
archive_max_size: 32
forgotten_eval_every: 500
forgotten_result_margin: 0.001
forgotten_min_episodes: 50_000

tags: ["go_9x9", "resnet"]
experiment_name: "Go9x9_resnet"

base_unit: 256
use_target_selfplay: false
dump_debug_every: null
