clip_value: 10.0
clip_eps: 0.15
value_coeff: 0.5
policy_coeff: 1.0
entropy_coeff: 0.01
entropy_coeff_start: 0.05
entropy_decay_iterations: 50_000
kl_coef: 5e-3

